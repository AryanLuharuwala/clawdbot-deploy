# BitforBytes / VeriLog — Vite+React frontend + Express backend, at bitforbytes.in.
SITE_NAME=bitforbytes
REPO=https://github.com/Madhur984/VeriLog.git
BRANCH=main
SRC_DIR="$HOME/verilog-src"

NEEDS_NODE=1
NEEDS_MONGO=0
NEEDS_CLOUDFLARED=1

# backend :3000, frontend (vite preview) :5173
BACKEND_PORT=3000
FRONTEND_PORT=5173

# Tunnel: a NAMED tunnel "madhur" with local credentials
# (secrets/.cloudflared/{cert.pem,<uuid>.json,config.yml}). Edit config.yml in the
# secrets bundle to change the hostname/ingress.
TUNNEL_MODE=named
TUNNEL_NAME=madhur
TUNNEL_HOSTNAME=bitforbytes.in

RUNNER_LABEL=clawdbot

SERVICES=(
  "verilog-backend:backend.service.tmpl:$BACKEND_PORT"
  "verilog-frontend:frontend.service.tmpl:$FRONTEND_PORT"
  "verilog-cloudflared:cloudflared-named.service.tmpl:"
)

SEED_CMD=""

# Secrets: "<path-inside-bundle>::<live-destination>"
SECRET_FILES=(
  '.cloudflared/cert.pem::$HOME/.cloudflared/cert.pem'
  '.cloudflared/madhur.json::$HOME/.cloudflared/be95c828-0f8c-4c71-91c0-d549939841a5.json'
  '.cloudflared/config.yml::$HOME/.cloudflared/config.yml'
  'backend.env::$HOME/backend.env'
  'vite.config.ts::$HOME/bitforbytes-vite.config.ts'
)
