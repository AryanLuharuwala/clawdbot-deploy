# Polly's / Dosa-Inn — Next.js 16 app + local MongoDB, served at pollys.food.
SITE_NAME=pollys
REPO=https://github.com/AryanLuharuwala/Dosa-Inn-Food-Tracker.git
BRANCH=master
SRC_DIR="$HOME/dosa-src"

NEEDS_NODE=1
NEEDS_MONGO=1
NEEDS_CLOUDFLARED=1

# Web app port (override at install: PORT=3200 ./deploy-cli.sh install pollys)
APP_PORT=3100

# Tunnel: this is a REMOTELY-MANAGED tunnel driven by a connector token
# (secrets/pollys -> ~/.cloudflared/pollys.env). Ingress (hostname->localhost:PORT)
# is configured in the Cloudflare dashboard / API, not here.
TUNNEL_MODE=token
TUNNEL_HOSTNAME=pollys.food

RUNNER_LABEL=dosa

# Declared services:  unit:template:port
SERVICES=(
  "mongod:mongod.service.tmpl:27017"
  "pollys-web:web.service.tmpl:$APP_PORT"
  "pollys-cloudflared:cloudflared-token.service.tmpl:"
)

# Idempotent DB seed from the repo's data/*.json (no-TLS local copy of migrate script).
SEED_CMD='sed "s/{ tls: true, retryWrites: false }/{ retryWrites: false }/" scripts/migrate-to-azure.ts > scripts/seed-local.ts && MONGO_URL=mongodb://127.0.0.1:27017 MONGO_DB_NAME=pollys-database npx --yes tsx scripts/seed-local.ts'

# Secrets: "<path-inside-bundle>::<live-destination>"
SECRET_FILES=(
  '.cloudflared/pollys.env::$HOME/.cloudflared/pollys.env'
  'pollys.env.local::$HOME/pollys.env.local'
)
